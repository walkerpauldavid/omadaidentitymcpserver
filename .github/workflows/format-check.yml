name: Format Check

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  format:
    name: Check Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # or match your project version

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort

      - name: 🖌️ Run Black formatter check
        run: |
          echo "🖌️ Running Black formatter check..."
          black --check ${{ env.PROJECT_NAME }}
        env:
          PROJECT_NAME: omada-mcp-server  # replace with your actual project name

      - name: 🔀 Run isort import sorter check
        run: |
          echo "🔀 Running isort import sorter check..."
          isort --profile black --check-only ${{ env.PROJECT_NAME }}
        env:
          PROJECT_NAME: omada-mcp-server  # same here